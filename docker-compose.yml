version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - ENV=prod
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "scripts/retrain_scheduler.py"]
    restart: always
    depends_on:
      - api
