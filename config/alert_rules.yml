groups:
  - name: phishshield_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on PhishShield API"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on PhishShield API"
          description: "p95 latency is {{ $value }}s over the last 5 minutes."

      - alert: ServiceDown
        expr: up{job="phishshield_api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PhishShield API is down"
          description: "The PhishShield API target has been unreachable for over 1 minute."
